research_interests: >
  My research focuses on building safe and reliable AI by advancing the
  principles necessary to develop epistemically intelligent systems --
  machine learning systems that can recognise, reason about, and communicate
  the limits of their knowledge. To achieve this, my research spans
  foundational theory to translational applications of imprecise
  probabilities as the main pillar for trustworthy AI.
